<!-- Paste into Shopify Page: Home content (handle: home-content) -->
<!-- Theme Editor → Homepage → RIIFT Page embed → select that page -->

<div
  data-riift-hero
  data-phrases='["Drag Free.","Tool-less.","Pure Performance."]'
  data-phrase-interval="2600"
>
  <div class="riift-hero__slides">
    <div class="riift-hero__slide is-active" style="background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 50%, #2a3a4a 100%);"></div>
  </div>
  <div class="riift-hero__scrim"></div>
  <div class="riift-hero__content">
    <p class="riift-eyebrow" style="color: rgba(255,255,255,0.55);">Efoil propulsion</p>
    <div class="riift-hero__headline riift-h1"></div>
    <p class="riift-body" style="margin-top: 20px; max-width: 48ch; color: rgba(255,255,255,0.7);">
      Balanced over the foil. RIIFT is a recess-integrated tracks and clip-in power system.
    </p>
    <a href="/pages/system" class="riift-btn riift-btn--pill" style="margin-top: 28px;">Explore the system</a>
  </div>
</div>

<div class="riift-band riift-band--off-white">
  <div class="riift-band__inner" data-reveal>
    <p class="riift-eyebrow">The heart of the system</p>
    <h2 class="riift-h2">Recess integrated</h2>
    <p class="riift-body" style="max-width: 60ch; margin-top: 16px;">
      Carbon tracks engineered into the board by your shaper. The battery's centre of mass sits directly over the foil's centre of lift.
    </p>
  </div>
</div>
