<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  [data-navlink]{display:none}
  @media(min-width:900px){ [data-navlink]{display:inline-flex !important} }
</style>
</helmet>

<nav style="position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:18px clamp(20px,4vw,56px);background:{{ navBg }};backdrop-filter:blur(10px);border-bottom:1px solid {{ navBorder }};transition:background 300ms ease,border-color 300ms ease">
  <a href="Home E - Wireframe.dc.html" style="display:inline-flex;align-items:center"><img src="assets/riift-logo-white.png" alt="RIIFT" style="height:22px;width:auto;display:block" /></a>
  <div style="display:flex;align-items:center;gap:clamp(16px,2.3vw,32px)">
    <sc-for list="{{ links }}" as="l" hint-placeholder-count="6">
      <a href="{{ l.href }}" onmouseenter="{{ l.enter }}" onmouseleave="{{ l.leave }}" data-navlink style="font-family:'Poppins';font-weight:600;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#fff;opacity:{{ l.opacity }};padding-bottom:3px;border-bottom:1.5px solid {{ l.underline }};transition:opacity 180ms ease">{{ l.label }}</a>
    </sc-for>
    <a href="Contact.dc.html" style="display:inline-flex;color:#fff;opacity:.85">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
    </a>
  </div>
</nav>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:68},&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { scrolled: false };
  componentDidMount() {
    this._o = () => { const s = window.scrollY > 40; if (s !== this.state.scrolled) this.setState({ scrolled: s }); };
    window.addEventListener('scroll', this._o, { passive: true });
  }
  componentWillUnmount() { window.removeEventListener('scroll', this._o); }
  renderVals() {
    const hover = (cb) => (e) => cb(e.currentTarget);
    const active = this.props.active || '';
    const defs = [
      ['boards','Boards','Boards.dc.html'],
      ['electronics','System','Electronics.dc.html'],
      ['shapers','Shapers','Shapers.dc.html'],
      ['dealers','Dealers','Dealers.dc.html'],
      ['people','People','People.dc.html'],
      ['contact','Contact','Contact.dc.html']
    ];
    const links = defs.map(([id, label, href]) => {
      const on = active === id;
      return {
        label, href,
        opacity: on ? '1' : '.72',
        underline: on ? '#fff' : 'transparent',
        enter: hover(el => { el.style.opacity = '1'; }),
        leave: hover(el => { el.style.opacity = on ? '1' : '.72'; })
      };
    });
    return {
      navBg: this.state.scrolled ? 'rgba(13,13,13,.92)' : 'rgba(13,13,13,0)',
      navBorder: this.state.scrolled ? '#222' : 'transparent',
      links
    };
  }
}
</script>
</body>
</html>
