name: Deploy theme to Shopify

# Git is the source of truth: push to master → theme-check → live Shopify deploy.
# Manual deploy: GitHub → Actions → "Deploy theme to Shopify" → Run workflow.

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: theme-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  theme-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Theme check
        run: shopify theme check
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
          SHOPIFY_FLAG_STORE: riift-hq.myshopify.com

  deploy:
    needs: theme-check
    if: (github.event_name == 'push' && github.ref == 'refs/heads/master') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Push to live theme
        run: shopify theme push --environment ci
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
